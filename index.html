<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>PackVault</title>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080808; --s1: #0f0f0f; --s2: #161616; --s3: #222;
  --border: #222; --border2: #333;
  --green: #00e676; --green-bg: rgba(0,230,118,0.08); --green-border: rgba(0,230,118,0.25);
  --red: #ff3d57; --red-bg: rgba(255,61,87,0.08); --red-border: rgba(255,61,87,0.3);
  --yellow: #ffd600; --yellow-bg: rgba(255,214,0,0.08);
  --blue: #40c4ff; --blue-bg: rgba(64,196,255,0.08);
  --text: #f0f0f0; --muted2: #666; --muted3: #aaa;
  --mono: 'Azeret Mono', monospace;
  --display: 'Barlow Condensed', sans-serif;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--mono); }

/* ── Full screen camera view ── */
.cam-full {
  position: fixed; inset: 0;
  background: #000;
  display: flex; flex-direction: column;
}
video {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  flex: 1; min-height: 0;
}
canvas#snap { display: none; }

/* ── Scan overlay ── */
.scan-overlay { position: absolute; inset: 0; pointer-events: none; }

/* Scan frame centered */
.scan-frame {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  width: 72vw; height: 100px;
}
.scan-frame::before, .scan-frame::after,
.scan-frame .c1, .scan-frame .c2 {
  content: ''; position: absolute; width: 28px; height: 28px;
  border-color: var(--muted3); border-style: solid;
  transition: border-color 0.3s;
}
.scan-frame::before { top:0;left:0;border-width:2px 0 0 2px; }
.scan-frame::after  { top:0;right:0;border-width:2px 2px 0 0; }
.scan-frame .c1 { bottom:0;left:0;border-width:0 0 2px 2px; }
.scan-frame .c2 { bottom:0;right:0;border-width:0 2px 2px 0; }
.scan-frame.wait::before,.scan-frame.wait::after,.scan-frame.wait .c1,.scan-frame.wait .c2 { border-color:var(--yellow); }
.scan-frame.pack::before,.scan-frame.pack::after,.scan-frame.pack .c1,.scan-frame.pack .c2 { border-color:var(--green); }

.scan-line {
  position: absolute; left:0; right:0; height:2px;
  background: linear-gradient(90deg,transparent,var(--green),transparent);
  box-shadow: 0 0 8px var(--green);
  opacity:0; top:50%;
}
.scan-line.on { opacity:1; animation: sweep 1.6s ease-in-out infinite; }
.scan-line.yellow { background:linear-gradient(90deg,transparent,var(--yellow),transparent); box-shadow:0 0 8px var(--yellow); }
@keyframes sweep { 0%{top:5%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:95%;opacity:0} }

/* Flash */
.flash { position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.06s; }
.flash.g { background:rgba(0,230,118,0.25); }
.flash.r { background:rgba(255,61,87,0.25); }
.flash.lit { opacity:1; }

/* Detected banner */
.det-banner {
  position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  border-radius:10px; padding:10px 20px;
  font-family:var(--display); font-size:16px; font-weight:900; letter-spacing:1px;
  opacity:0; pointer-events:none; transition:opacity 0.1s;
  white-space:nowrap; text-align:center; max-width:90vw;
  overflow:hidden; text-overflow:ellipsis;
}
.det-banner.show { opacity:1; }
.det-banner.g { background:var(--green); color:#000; box-shadow:0 0 30px rgba(0,230,118,0.5); }
.det-banner.r { background:var(--red); color:#fff; box-shadow:0 0 30px rgba(255,61,87,0.5); }

/* ── Top HUD ── */
.hud-top {
  position:absolute; top:0; left:0; right:0;
  padding: env(safe-area-inset-top, 12px) 12px 12px;
  display:flex; justify-content:space-between; align-items:flex-start;
  background: linear-gradient(rgba(0,0,0,0.7), transparent);
  pointer-events:none;
}
.hud-top > * { pointer-events:auto; }
.brand { font-family:var(--display); font-size:18px; font-weight:900; letter-spacing:2px; color:#fff; }
.brand em { color:var(--green); font-style:normal; }
.timer { font-family:var(--display); font-size:28px; font-weight:900; color:#fff; letter-spacing:2px; text-shadow:0 0 10px rgba(0,0,0,0.8); }

/* Rec dot */
.rec-dot { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--red); letter-spacing:1px; display:none; }
.rec-dot span { width:8px; height:8px; border-radius:50%; background:var(--red); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

/* ── State strip (center of screen) ── */
.state-strip {
  position:absolute; top:50%; left:50%; transform:translate(-50%, 20px);
  text-align:center; pointer-events:none;
}
.state-instr {
  font-size:13px; font-weight:600; letter-spacing:0.5px;
  padding:6px 16px; border-radius:20px;
  display:none;
}
.state-instr.visible { display:inline-block; }
.state-instr.idle { background:rgba(0,0,0,0.6); color:var(--muted3); }
.state-instr.wait { background:rgba(255,214,0,0.15); color:var(--yellow); border:1px solid rgba(255,214,0,0.3); }
.state-instr.pack { background:rgba(0,230,118,0.12); color:var(--green); border:1px solid rgba(0,230,118,0.25); }

.curr-pkg-strip {
  margin-top:8px; display:none;
  font-family:var(--display); font-size:20px; font-weight:900;
  color:#fff; letter-spacing:1px; text-shadow:0 0 12px rgba(0,0,0,0.9);
}
.curr-pkg-strip.visible { display:block; }

/* ── Bottom panel ── */
.bottom-panel {
  position:absolute; bottom:0; left:0; right:0;
  background: linear-gradient(transparent, rgba(0,0,0,0.92) 30%);
  padding: 20px 16px env(safe-area-inset-bottom, 16px);
}

/* Session controls (shown before start) */
.pre-session { text-align:center; }
.btn-big {
  font-family:var(--display); font-weight:900; font-size:18px; letter-spacing:2px;
  border:none; border-radius:12px; cursor:pointer; padding:16px 32px;
  display:inline-flex; align-items:center; gap:8px; transition:all 0.15s;
  width:100%; justify-content:center;
}
.btn-big.start { background:var(--green); color:#000; }
.btn-big.stop  { background:var(--red); color:#fff; }
.btn-big:active { transform:scale(0.97); }

/* Active session bottom */
.active-session { display:none; }
.active-session.visible { display:block; }

/* Package counter row */
.pkg-row {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.pkg-count { font-family:var(--display); font-size:32px; font-weight:900; color:var(--green); line-height:1; }
.pkg-label { font-size:10px; color:var(--muted3); letter-spacing:1px; margin-top:2px; }
.upload-status { font-size:11px; color:var(--blue); text-align:right; }

/* Action buttons row */
.action-row { display:flex; gap:8px; }
.btn-sm {
  font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:1px;
  border:none; border-radius:8px; cursor:pointer; padding:10px 14px;
  display:inline-flex; align-items:center; gap:5px; transition:all 0.15s; flex:1; justify-content:center;
}
.btn-sm:active { transform:scale(0.96); }
.btn-sm.stop-sm { background:var(--red); color:#fff; flex:2; }
.btn-sm.manual { background:var(--s3); color:var(--muted3); border:1px solid var(--border2); }
.btn-sm.cfg    { background:var(--s3); color:var(--muted3); border:1px solid var(--border2); }
.btn-sm.upload { background:var(--blue); color:#000; flex:2; }
.btn-sm:disabled { opacity:0.3; cursor:not-allowed; }

/* Auth row */
.auth-row { margin-bottom:14px; }
.btn-auth {
  width:100%; font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:1px;
  border:none; border-radius:8px; cursor:pointer; padding:11px;
  display:flex; align-items:center; justify-content:center; gap:7px; transition:all 0.15s;
  background:var(--green); color:#000;
}
.btn-auth.signed-in { background:var(--s3); color:var(--muted3); border:1px solid var(--border2); }
.btn-auth:active { transform:scale(0.98); }

/* Segments drawer */
.seg-drawer {
  position:fixed; inset:0; background:rgba(0,0,0,0.9);
  display:none; flex-direction:column; z-index:50;
  padding: env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
}
.seg-drawer.open { display:flex; animation:slideUp 0.25s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
.seg-drawer-head {
  padding:16px 16px 12px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.seg-drawer-head h2 { font-family:var(--display); font-size:20px; font-weight:900; }
.btn-close { background:var(--s3); border:1px solid var(--border2); color:var(--muted3); border-radius:8px; padding:6px 14px; font-family:var(--mono); font-size:12px; cursor:pointer; }
.seg-scroll { flex:1; overflow-y:auto; padding:10px 12px; }
.seg-card {
  background:var(--s2); border:1px solid var(--border); border-radius:10px;
  padding:12px 14px; margin-bottom:8px; animation:fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.seg-card.open     { border-color:var(--green-border); background:var(--green-bg); }
.seg-card.pending  { }
.seg-card.uploading{ border-color:rgba(64,196,255,0.3); }
.seg-card.done     { border-color:rgba(0,230,118,0.2); }
.seg-card.error    { border-color:var(--red-border); }
.sc-top { display:flex; justify-content:space-between; gap:6px; margin-bottom:4px; }
.sc-id  { font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sc-st  { font-size:10px; flex-shrink:0; }
.sc-st.open{color:var(--green)} .sc-st.pending{color:var(--muted2)} .sc-st.uploading{color:var(--blue)} .sc-st.done{color:var(--green)} .sc-st.error{color:var(--red)}
.sc-awb  { font-size:11px; color:var(--muted3); margin-bottom:6px; word-break:break-all; }
.sc-meta { font-size:10px; color:var(--muted2); margin-bottom:8px; }
.sc-dur  { color:var(--yellow); font-weight:600; }
.sc-acts { display:flex; gap:6px; flex-wrap:wrap; }
.sa {
  font-size:11px; font-family:var(--mono); border-radius:6px; padding:5px 12px;
  border:1px solid var(--border2); background:transparent; color:var(--muted3);
  cursor:pointer; text-decoration:none; display:inline-block;
}
.sa.g { border-color:var(--green-border); color:var(--green); }
.prog { height:2px; background:var(--border); border-radius:2px; margin-top:8px; display:none; }
.prog.on { display:block; }
.prog-fill { height:100%; background:var(--blue); border-radius:2px; width:0%; transition:width 0.3s; }
.prog-lbl { font-size:10px; color:var(--blue); margin-top:3px; display:none; }
.prog-lbl.on { display:block; }

/* Upload all bar in drawer */
.drawer-upload {
  padding:12px 14px; border-top:1px solid var(--border); display:none;
}
.drawer-upload.on { display:block; }
.btn-upload-all {
  width:100%; background:var(--blue); color:#000;
  font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:1px;
  border:none; border-radius:8px; padding:12px;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px;
}

/* Config/Manual modals */
.modal-bg {
  position:fixed; inset:0; background:rgba(0,0,0,0.92);
  display:none; place-items:center; z-index:100; padding:20px;
}
.modal-bg.open { display:grid; animation:fadein 0.18s; }
@keyframes fadein { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--s1); border:1px solid var(--border2); border-radius:16px;
  padding:24px; width:100%; max-width:440px; animation:popin 0.18s ease;
}
@keyframes popin { from{opacity:0;transform:scale(0.93)} to{opacity:1;transform:none} }
.modal h2 { font-family:var(--display); font-size:22px; font-weight:900; margin-bottom:4px; }
.modal-sub { font-size:11px; color:var(--muted2); margin-bottom:18px; line-height:1.6; }
.mf label { display:block; font-size:10px; color:var(--muted2); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
.mf input {
  width:100%; background:var(--s3); border:1px solid var(--border2); color:var(--text);
  font-family:var(--mono); font-size:14px; font-weight:600; padding:12px;
  border-radius:8px; outline:none; transition:border-color 0.2s; margin-bottom:14px;
}
.mf input:focus { border-color:var(--green); }
.mf .hint { font-size:10px; color:var(--muted2); margin-top:-10px; margin-bottom:14px; line-height:1.5; }
.modal-acts { display:flex; gap:8px; }
.btn-confirm { flex:1; background:var(--green); color:#000; font-family:var(--mono); font-weight:700; font-size:12px; letter-spacing:1px; border:none; border-radius:8px; padding:13px; cursor:pointer; }
.btn-cancel  { background:var(--s3); color:var(--muted2); font-family:var(--mono); font-size:12px; border:1px solid var(--border2); border-radius:8px; padding:13px 18px; cursor:pointer; }

/* Toast */
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--s1); border:1px solid var(--border2); border-radius:8px;
  padding:10px 18px; font-size:12px; white-space:nowrap;
  opacity:0; transition:all 0.22s ease; z-index:200;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.ok  { border-color:var(--green-border); }
.toast.err { border-color:var(--red-border); }
</style>
</head>
<body>

<!-- Full screen camera -->
<div class="cam-full">
  <video id="camFeed" autoplay muted playsinline></video>
  <canvas id="snap"></canvas>

  <!-- Scan overlay -->
  <div class="scan-overlay">
    <div class="flash g" id="flashG"></div>
    <div class="flash r" id="flashR"></div>

    <div class="scan-frame" id="scanFrame">
      <div class="c1"></div><div class="c2"></div>
      <div class="scan-line" id="scanLine"></div>
    </div>

    <div class="det-banner" id="detBanner"></div>

    <div class="state-strip">
      <div class="state-instr idle visible" id="instrIdle">Sign in → tap START</div>
      <div class="state-instr wait" id="instrWait">Scan CONTAINER label to start</div>
      <div class="state-instr pack" id="instrPack">Pack item → scan AWB to finish</div>
      <div class="curr-pkg-strip" id="currPkg"></div>
    </div>
  </div>

  <!-- Top HUD -->
  <div class="hud-top">
    <div>
      <div class="brand">PACK<em>V</em></div>
      <div class="rec-dot" id="recDot"><span></span>REC</div>
    </div>
    <div class="timer" id="timerHud">00:00:00</div>
  </div>

  <!-- Bottom panel -->
  <div class="bottom-panel">
    <!-- Auth -->
    <div class="auth-row">
      <button class="btn-auth" id="btnAuth" onclick="handleAuth()">🔑 Sign in with Google</button>
    </div>

    <!-- Pre-session -->
    <div class="pre-session" id="preSession">
      <button class="btn-big start" id="btnStart" onclick="startSession()" disabled>▶ START SESSION</button>
    </div>

    <!-- Active session -->
    <div class="active-session" id="activeSession">
      <div class="pkg-row">
        <div>
          <div class="pkg-count" id="pkgCount">0</div>
          <div class="pkg-label">PACKAGES</div>
        </div>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
      <div class="action-row">
        <button class="btn-sm stop-sm" onclick="stopSession()">■ END</button>
        <button class="btn-sm manual" onclick="openManual()">⌨</button>
        <button class="btn-sm cfg" onclick="openConfig()">⚙</button>
        <button class="btn-sm upload" id="btnUpload" onclick="openDrawer()" style="display:none;">☁ UPLOAD</button>
      </div>
    </div>
  </div>
</div>

<!-- Segments drawer -->
<div class="seg-drawer" id="segDrawer">
  <div class="seg-drawer-head">
    <h2>Segments</h2>
    <button class="btn-close" onclick="closeDrawer()">✕ Close</button>
  </div>
  <div class="seg-scroll" id="segScroll"></div>
  <div class="drawer-upload" id="drawerUpload">
    <button class="btn-upload-all" onclick="uploadAll()">☁ Upload All to Google Drive</button>
  </div>
</div>

<!-- Config modal -->
<div class="modal-bg" id="configModal">
  <div class="modal">
    <h2>⚙ Config</h2>
    <div class="modal-sub">Enter your Google OAuth Client ID. Set once, works on all stations.</div>
    <div class="mf">
      <label>Google OAuth Client ID</label>
      <input type="text" id="cfgClientId" placeholder="419552917873-xxxx.apps.googleusercontent.com">
      <label>Drive Folder Name</label>
      <input type="text" id="cfgFolderName" value="PackVault - Packing Videos">
      <label>Station Name</label>
      <input type="text" id="cfgStation" placeholder="e.g. Station-A">
    </div>
    <div class="modal-acts">
      <button class="btn-confirm" onclick="saveConfig()">✓ SAVE</button>
      <button class="btn-cancel" onclick="closeConfig()">CANCEL</button>
    </div>
  </div>
</div>

<!-- Manual modal -->
<div class="modal-bg" id="manualModal">
  <div class="modal">
    <h2>⌨ Manual Entry</h2>
    <div class="modal-sub">Use when barcode can't be scanned.</div>
    <div class="mf">
      <label>Container ID (BKI1-…)</label>
      <input type="text" id="mContainer" placeholder="BKI1-000003977" autocomplete="off">
      <label>AWB Number (GK-11-…)</label>
      <input type="text" id="mAwb" placeholder="GK-11-872089135" autocomplete="off">
    </div>
    <div class="modal-acts">
      <button class="btn-confirm" onclick="confirmManual()">✓ CONFIRM</button>
      <button class="btn-cancel" onclick="closeManual()">CANCEL</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="tMsg"></span></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
let cfg = {
  clientId:   localStorage.getItem('pv_clientId')   || '',
  folderName: localStorage.getItem('pv_folderName') || 'PackVault - Packing Videos',
  station:    localStorage.getItem('pv_station')    || ''
};

// ─── AUTH ─────────────────────────────────────────────────────────────────────
let accessToken = null;
let driveFolder = null;

function initGoogleAuth() {
  if (!cfg.clientId || !window.google) return;
  window._gClient = google.accounts.oauth2.initTokenClient({
    client_id: cfg.clientId,
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile',
    callback: onTokenReceived,
  });
}

function handleAuth() {
  if (accessToken) {
    google.accounts.oauth2.revoke(accessToken, ()=>{});
    accessToken = null; driveFolder = null;
    updateAuthUI(false, null);
    showToast('Signed out', '');
    return;
  }
  if (!cfg.clientId) { openConfig(); return; }
  if (!window._gClient) initGoogleAuth();
  window._gClient.requestAccessToken();
}

async function onTokenReceived(response) {
  if (response.error) { showToast('Auth error: ' + response.error, 'err'); return; }
  accessToken = response.access_token;
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: 'Bearer ' + accessToken } });
    const u = await r.json();
    updateAuthUI(true, u);
    driveFolder = await getOrCreateFolder(cfg.folderName);
    showToast('✓ Signed in as ' + (u.name || u.email), 'ok');
  } catch(e) { showToast('Could not fetch user info', 'err'); }
}

function updateAuthUI(isIn, user) {
  const btn = document.getElementById('btnAuth');
  if (isIn && user) {
    btn.textContent = '✓ ' + (user.name || user.email);
    btn.classList.add('signed-in');
    document.getElementById('btnStart').disabled = false;
  } else {
    btn.textContent = '🔑 Sign in with Google';
    btn.classList.remove('signed-in');
    document.getElementById('btnStart').disabled = true;
  }
}

// ─── BARCODE PATTERNS ─────────────────────────────────────────────────────────
function classifyBarcode(raw) {
  const v = raw.trim();
  if (/^BKI\d*-/i.test(v)) return 'container';
  if (/^GK-/i.test(v)) return 'awb';
  if (/^(JP|JX|SCP|AAJ|JNE|REG|OKE|YES)\d/i.test(v)) return 'awb';
  if (/^\d{10,}$/.test(v)) return 'awb';
  return 'unknown';
}

// ─── CAMERA ───────────────────────────────────────────────────────────────────
let stream = null;

async function initCamera() {
  try {
    // Use environment (rear) camera — best for overhead mount
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 }, height: { ideal: 1080 },
        focusMode: 'continuous'
      },
      audio: true
    });
    document.getElementById('camFeed').srcObject = stream;
  } catch(e) {
    showToast('Camera error — allow access', 'err');
  }
}
initCamera();

// ─── BARCODE DETECTION ────────────────────────────────────────────────────────
// Android Chrome has native BarcodeDetector — no library needed
let detector = null;
let scanIv = null;
let lastSeen = { code: null, ts: 0 };
const COOLDOWN = 3500;

async function initDetector() {
  if (!('BarcodeDetector' in window)) {
    showToast('⚠ BarcodeDetector not supported — use Manual', 'err');
    return false;
  }
  try {
    const fmts = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats: fmts.length ? fmts : ['code_128','code_39','ean_13','ean_8','upc_a','itf','codabar'] });
    return true;
  } catch { return false; }
}

function startScan() {
  const video = document.getElementById('camFeed');
  const canvas = document.getElementById('snap');
  const ctx = canvas.getContext('2d');
  document.getElementById('scanLine').classList.add('on');

  scanIv = setInterval(async () => {
    if (!detector || !video.videoWidth) return;
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    try {
      const codes = await detector.detect(canvas);
      if (!codes.length) return;
      const raw = codes[0].rawValue.trim();
      const now = Date.now();
      if (raw === lastSeen.code && now - lastSeen.ts < COOLDOWN) return;
      lastSeen = { code: raw, ts: now };
      handleBarcode(raw);
    } catch {}
  }, 250);
}

function stopScan() {
  clearInterval(scanIv);
  document.getElementById('scanLine').classList.remove('on');
}

function handleBarcode(raw) {
  const type = classifyBarcode(raw);
  if (type === 'container') {
    if (packState === 'waiting_awb') { sealSegment(null); showToast('⚠ Prev package auto-sealed', 'err'); }
    startPackage(raw);
    doFlash('g'); showBanner(raw, 'g');
    showToast('📦 ' + raw, 'ok');
  } else if (type === 'awb') {
    if (packState === 'waiting_awb') {
      doFlash('r'); showBanner('AWB: ' + raw, 'r');
      showToast('✅ ' + raw + ' sealed', 'ok');
      sealSegment(raw);
    } else {
      showToast('⚠ Scan container first', 'err');
    }
  }
}

// ─── SESSION STATE ────────────────────────────────────────────────────────────
let mediaRecorder = null, chunks = [];
let sessionStart = null, timerIv = null;
let sessionActive = false;
let packState = 'idle';
let currentContainer = null;
let segments = [];

// Android Chrome records in mp4 natively
let mimeType = ['video/mp4;codecs=h264,aac','video/mp4','video/webm;codecs=vp9','video/webm']
  .find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

async function startSession() {
  if (!stream) { showToast('No camera', 'err'); return; }
  if (!accessToken) { showToast('Sign in first', 'err'); return; }

  await initDetector();
  chunks = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType });
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.start(500);

  sessionStart = Date.now();
  timerIv = setInterval(() => { document.getElementById('timerHud').textContent = fmtMs(nowMs()); }, 500);
  sessionActive = true;
  startScan();

  document.getElementById('preSession').style.display = 'none';
  document.getElementById('activeSession').classList.add('visible');
  document.getElementById('recDot').style.display = 'flex';
  document.getElementById('scanFrame').className = 'scan-frame wait';
  setInstr('wait');
  showToast('▶ Session started', 'ok');
}

function stopSession() {
  stopScan();
  if (packState === 'waiting_awb') { sealSegment(null); showToast('⚠ Last pkg auto-sealed', 'err'); }
  if (mediaRecorder) { mediaRecorder.stop(); mediaRecorder = null; }
  clearInterval(timerIv);
  sessionActive = false; packState = 'idle'; currentContainer = null;

  document.getElementById('preSession').style.display = 'block';
  document.getElementById('activeSession').classList.remove('visible');
  document.getElementById('recDot').style.display = 'none';
  document.getElementById('scanFrame').className = 'scan-frame';
  setInstr('idle');
  document.getElementById('currPkg').classList.remove('visible');

  if (segments.length > 0) {
    document.getElementById('btnUpload').style.display = 'flex';
    showToast(`✓ ${segments.length} segments ready`, 'ok');
  }
  renderSegments(); updateUploadBar();
  openDrawer();
}

// ─── PACKAGE LIFECYCLE ────────────────────────────────────────────────────────
function startPackage(containerId) {
  packState = 'waiting_awb';
  currentContainer = { id: containerId, startMs: nowMs() };
  document.getElementById('scanFrame').className = 'scan-frame pack';
  document.getElementById('scanLine').classList.add('yellow');
  document.getElementById('currPkg').textContent = containerId;
  document.getElementById('currPkg').classList.add('visible');
  setInstr('pack');
}

function sealSegment(awbId) {
  if (!currentContainer) return;
  segments.push({
    id: Date.now() + Math.random(),
    containerId: currentContainer.id,
    awbId: awbId || '(missing)',
    startMs: currentContainer.startMs,
    endMs: nowMs(),
    status: awbId ? 'pending' : 'error',
    driveLink: null, missingAwb: !awbId
  });
  currentContainer = null; packState = 'idle';
  document.getElementById('scanFrame').className = 'scan-frame wait';
  document.getElementById('scanLine').classList.remove('yellow');
  document.getElementById('currPkg').classList.remove('visible');
  setInstr('wait');
  updatePkgCount(); updateUploadBar();
}

// ─── GOOGLE DRIVE ─────────────────────────────────────────────────────────────
async function driveRequest(url, options = {}) {
  if (!accessToken) throw new Error('Not authenticated');
  const res = await fetch(url, { ...options, headers: { Authorization: 'Bearer ' + accessToken, ...(options.headers||{}) } });
  if (res.status === 401) { accessToken = null; updateAuthUI(false,null); throw new Error('Token expired'); }
  return res;
}

async function getOrCreateFolder(name) {
  const q = encodeURIComponent(`mimeType='application/vnd.google-apps.folder' and name='${name}' and trashed=false`);
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&pageSize=1`);
  const data = await res.json();
  if (data.files && data.files.length > 0) return data.files[0];
  const cr = await driveRequest('https://www.googleapis.com/drive/v3/files', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, mimeType: 'application/vnd.google-apps.folder' })
  });
  return await cr.json();
}

async function uploadToDrive(blob, fileName, onProgress) {
  if (!driveFolder) driveFolder = await getOrCreateFolder(cfg.folderName);
  const mime = blob.type || mimeType;
  const meta = { name: fileName, parents: [driveFolder.id] };
  const initRes = await driveRequest(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&fields=id,webViewLink,name',
    { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Upload-Content-Type': mime, 'X-Upload-Content-Length': blob.size }, body: JSON.stringify(meta) }
  );
  const uploadUrl = initRes.headers.get('Location');
  if (!uploadUrl) throw new Error('Could not start upload');

  const CHUNK = 5 * 1024 * 1024;
  let offset = 0, fileId = null, webViewLink = null;
  while (offset < blob.size) {
    const end = Math.min(offset + CHUNK, blob.size);
    const chunkRes = await fetch(uploadUrl, {
      method: 'PUT',
      headers: { 'Content-Range': `bytes ${offset}-${end-1}/${blob.size}`, 'Content-Type': mime },
      body: blob.slice(offset, end)
    });
    if (chunkRes.status === 308) {
      const range = chunkRes.headers.get('Range');
      offset = range ? parseInt(range.split('-')[1]) + 1 : end;
    } else if (chunkRes.status === 200 || chunkRes.status === 201) {
      const result = await chunkRes.json();
      fileId = result.id; webViewLink = result.webViewLink; offset = blob.size;
    } else { throw new Error(`Upload failed: ${chunkRes.status}`); }
    onProgress && onProgress(Math.round((Math.min(offset,blob.size)/blob.size)*100));
  }
  if (fileId && !webViewLink) {
    const info = await driveRequest(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=webViewLink`);
    webViewLink = (await info.json()).webViewLink;
  }
  return { fileId, webViewLink, fileName };
}

// ─── UPLOAD ───────────────────────────────────────────────────────────────────
async function uploadOne(segId) {
  const s = segments.find(x => String(x.id) === String(segId));
  if (!s || !accessToken) return;
  s.status = 'uploading'; renderSegments();

  try {
    const fullBlob = new Blob(chunks, { type: mimeType });
    const sessDur = sessionStart ? Date.now() - sessionStart : 1;
    const tb = fullBlob.size;
    const sb = Math.max(0, Math.floor((s.startMs/sessDur)*tb));
    const eb = Math.min(tb, Math.floor(((s.endMs||sessDur)/sessDur)*tb));
    const sliced = fullBlob.slice(sb, eb, mimeType);
    const blob = sliced.size > 10000 ? sliced : fullBlob;

    const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const date = new Date().toISOString().slice(0,10);
    const station = cfg.station ? `_[${cfg.station}]` : '';
    const fileName = `[${s.containerId}]_[${s.awbId}]${station}_${date}_${fmtMs(s.startMs).replace(/:/g,'-')}_to_${fmtMs(s.endMs).replace(/:/g,'-')}.${ext}`;

    const result = await uploadToDrive(blob, fileName, (pct) => {
      const f = document.getElementById(`pf-${s.id}`);
      const l = document.getElementById(`pl-${s.id}`);
      if (f) { f.closest('.prog').classList.add('on'); f.style.width=pct+'%'; }
      if (l) { l.classList.add('on'); l.textContent=`Uploading ${pct}%…`; }
    });

    s.status = 'done'; s.driveLink = result.webViewLink;
    showToast('✓ Uploaded: ' + s.containerId, 'ok');
  } catch(e) {
    s.status = 'error';
    showToast('✗ ' + e.message, 'err');
  }
  renderSegments(); updateUploadBar();
}

async function uploadAll() {
  const pending = segments.filter(s => s.status==='pending'||s.status==='error');
  for (const s of pending) { await uploadOne(s.id); await wait(300); }
  updateUploadBar();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderSegments() {
  const list = document.getElementById('segScroll');
  const stMap = { pending:'⏳', uploading:'↑', done:'✓', error:'✗' };
  const stClass = { pending:'pending', uploading:'uploading', done:'done', error:'error' };

  let openCard = '';
  if (packState==='waiting_awb' && currentContainer) {
    openCard = `<div class="seg-card open"><div class="sc-top"><div class="sc-id">${currentContainer.id}</div><div class="sc-st open">▶ PACKING</div></div><div class="sc-awb">Waiting for AWB…</div><div class="sc-meta">Started ${fmtMs(currentContainer.startMs)}</div></div>`;
  }

  const cards = [...segments].reverse().map(s => `
    <div class="seg-card ${stClass[s.status]}" id="sc-${s.id}">
      <div class="sc-top"><div class="sc-id">${s.containerId}</div><div class="sc-st ${stClass[s.status]}">${stMap[s.status]} ${s.status.toUpperCase()}</div></div>
      <div class="sc-awb">${s.awbId}${s.missingAwb?' ⚠':''}</div>
      <div class="sc-meta">${fmtMs(s.startMs)} → ${fmtMs(s.endMs)} · <span class="sc-dur">${fmtMs(s.endMs-s.startMs)}</span></div>
      <div class="sc-acts">
        ${s.status==='pending'            ? `<button class="sa g" onclick="uploadOne('${s.id}')">☁ Upload</button>`:''}
        ${s.status==='error'              ? `<button class="sa g" onclick="uploadOne('${s.id}')">↺ Retry</button>`:''}
        ${s.status==='done'&&s.driveLink  ? `<a href="${s.driveLink}" target="_blank" class="sa g">🔗 Drive</a>`:''}
        <button class="sa" onclick="copyInfo('${s.id}')">📋 Copy</button>
      </div>
      <div class="prog" id="prog-${s.id}"><div class="prog-fill" id="pf-${s.id}"></div></div>
      <div class="prog-lbl" id="pl-${s.id}"></div>
    </div>`).join('');

  list.innerHTML = openCard + (cards || '<div style="text-align:center;padding:40px 0;color:var(--muted2);font-size:12px;">No segments yet</div>');
}

function updatePkgCount() {
  document.getElementById('pkgCount').textContent = segments.length + (packState==='waiting_awb'?1:0);
}

function updateUploadBar() {
  const has = segments.some(s=>s.status==='pending'||s.status==='error');
  document.getElementById('drawerUpload').classList.toggle('on', has);
  document.getElementById('btnUpload').style.display = (has||segments.some(s=>s.status==='done')) ? 'flex' : 'none';
  const done = segments.filter(s=>s.status==='done').length;
  const pend = segments.filter(s=>s.status==='pending'||s.status==='error').length;
  document.getElementById('uploadStatus').textContent = done ? `${done} uploaded, ${pend} pending` : pend ? `${pend} pending upload` : '';
}

function copyInfo(segId) {
  const s = segments.find(x=>String(x.id)===String(segId));
  if (!s) return;
  const t = ['=== PACKING VIDEO CLAIM INFO ===',`Container : ${s.containerId}`,`AWB       : ${s.awbId}`,`Station   : ${cfg.station||'—'}`,`Duration  : ${fmtMs(s.endMs-s.startMs)}`,`Date      : ${new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'})}`,`Drive     : ${s.driveLink||'Not uploaded'}`].join('\n');
  navigator.clipboard.writeText(t).then(()=>showToast('📋 Copied','ok'));
}

// ─── DRAWER ───────────────────────────────────────────────────────────────────
function openDrawer()  { renderSegments(); document.getElementById('segDrawer').classList.add('open'); }
function closeDrawer() { document.getElementById('segDrawer').classList.remove('open'); }

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openConfig() {
  document.getElementById('cfgClientId').value   = cfg.clientId;
  document.getElementById('cfgFolderName').value = cfg.folderName;
  document.getElementById('cfgStation').value    = cfg.station;
  document.getElementById('configModal').classList.add('open');
}
function closeConfig() { document.getElementById('configModal').classList.remove('open'); }
function saveConfig() {
  cfg.clientId   = document.getElementById('cfgClientId').value.trim();
  cfg.folderName = document.getElementById('cfgFolderName').value.trim() || 'PackVault - Packing Videos';
  cfg.station    = document.getElementById('cfgStation').value.trim();
  localStorage.setItem('pv_clientId', cfg.clientId);
  localStorage.setItem('pv_folderName', cfg.folderName);
  localStorage.setItem('pv_station', cfg.station);
  closeConfig(); showToast('✓ Config saved', 'ok');
  if (cfg.clientId) setTimeout(initGoogleAuth, 300);
}
function openManual()  { document.getElementById('manualModal').classList.add('open'); setTimeout(()=>document.getElementById('mContainer').focus(),80); }
function closeManual() { document.getElementById('manualModal').classList.remove('open'); document.getElementById('mContainer').value=''; document.getElementById('mAwb').value=''; }
function confirmManual() {
  const cont = document.getElementById('mContainer').value.trim();
  const awb  = document.getElementById('mAwb').value.trim();
  closeManual();
  if (cont && packState==='idle')       { startPackage(cont); doFlash('g'); showToast('⌨ Container: '+cont,'ok'); }
  if (awb && packState==='waiting_awb') { doFlash('r'); sealSegment(awb); showToast('⌨ AWB: '+awb,'ok'); }
  if (cont && awb && packState==='idle') {
    const ms=nowMs(); segments.push({id:Date.now(),containerId:cont,awbId:awb,startMs:ms,endMs:ms+1000,status:'pending',driveLink:null});
    updatePkgCount(); updateUploadBar(); showToast('⌨ Segment: '+cont+' / '+awb,'ok');
  }
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function setInstr(which) {
  ['instrIdle','instrWait','instrPack'].forEach(id=>document.getElementById(id).classList.remove('visible'));
  const map={idle:'instrIdle',wait:'instrWait',pack:'instrPack'};
  if (map[which]) document.getElementById(map[which]).classList.add('visible');
}
function doFlash(cls) {
  const el = document.getElementById('flash'+cls.toUpperCase());
  if (el) { el.classList.add('lit'); setTimeout(()=>el.classList.remove('lit'),120); }
}
function showBanner(text, cls) {
  const b=document.getElementById('detBanner');
  b.textContent=text; b.className='det-banner show '+cls;
  setTimeout(()=>b.className='det-banner',2200);
}
function nowMs()  { return sessionStart ? Date.now()-sessionStart : 0; }
function fmtMs(ms) {
  if (!ms&&ms!==0) return '—';
  const s=Math.floor(Math.abs(ms)/1000);
  return [Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');
}
function wait(ms) { return new Promise(r=>setTimeout(r,ms)); }

let _tt;
function showToast(msg, type) {
  const el=document.getElementById('toast');
  document.getElementById('tMsg').textContent=msg;
  el.className='toast show '+(type||'');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (!cfg.clientId) setTimeout(openConfig, 800);
window.addEventListener('load', () => { setTimeout(initGoogleAuth, 1000); });
</script>
